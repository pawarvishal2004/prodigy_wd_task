<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Landing Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        nav {
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            background: transparent;
            display: flex;
            justify-content: space-between;
            padding: 15px 50px;
            transition: 0.3s;
            z-index: 1000;
        }

        .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 18px;
            transition: 0.3s;
        }

        /* Hover effect */
        nav ul li a:hover {
            color: yellow;
        }

        /* Scroll effect */
        nav.scrolled {
            background: black;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(to right, purple, blue);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .content {
            height: 1000px;
            padding: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 15px 20px;
            }

            nav ul {
                flex-direction: column;
                background: black;
                position: absolute;
                top: 60px;
                right: 0;
                width: 200px;
                display: none;
            }

            nav ul.show {
                display: flex;
            }

            .menu-toggle {
                display: block;
                cursor: pointer;
                color: white;
                font-size: 24px;
            }
        }

        .menu-toggle {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav id="navbar">
        <div class="logo">MySite</div>

        <div class="menu-toggle" onclick="toggleMenu()">☰</div>

        <ul id="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to My Website</h1>
        <p>Scroll down to see navbar effect</p>
    </section>

    <!-- Content -->
    <section class="content">
        
    </section>

    <script>
        // Scroll effect
        window.addEventListener("scroll", function() {
            let navbar = document.getElementById("navbar");

            if (window.scrollY > 50) {
                navbar.classList.add("scrolled");
            } else {
                navbar.classList.remove("scrolled");
            }
        });

        // Mobile menu toggle
        function toggleMenu() {
            let menu = document.getElementById("menu");
            menu.classList.toggle("show");
        }
    </script>

</body>
</html>
